# idempotency_key: ai-router-compose-normalize-2025-10-21-v2

services:
  ai-router:
    build:
      context: .
    image: ai-router:local
    env_file:
      - ${AI_STACK_ENV:-/srv-2/secrets/ai-stack/ai-stack.env}
    ports:
      - "8082:8082"
    restart: unless-stopped
    healthcheck:
      test: ["CMD","python","-c","import sys,urllib.request; sys.exit(0 if urllib.request.urlopen(\"http://localhost:8082/healthz\",timeout=2).getcode()==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
